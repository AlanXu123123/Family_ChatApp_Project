<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="家庭专属聊天工具">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- iOS PWA 配置 -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JChat">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- 主题色 -->
  <meta name="theme-color" content="#0A0A12">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Justin Chat</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overscroll-behavior: none;
      background: linear-gradient(180deg, #0A0A12 0%, #1A1A2E 50%, #0F0F1E 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    }

    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #0A0A12 0%, #1A1A2E 50%, #0F0F1E 100%);
      z-index: 9999;
      transition: opacity 0.5s ease-out;
      -webkit-tap-highlight-color: transparent;
    }
    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .splash-logo {
      width: 88px;
      height: 88px;
      border-radius: 24px;
      background: linear-gradient(135deg, #007AFF 0%, #5856D6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      box-shadow: 0 10px 40px rgba(88, 86, 214, 0.4);
      animation: logoFloat 2.4s ease-in-out infinite;
    }
    .splash-logo svg {
      width: 44px;
      height: 44px;
      fill: white;
    }
    @keyframes logoFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .splash-title {
      color: white;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .splash-subtitle {
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      margin-bottom: 36px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid rgba(255, 255, 255, 0.12);
      border-top-color: rgba(255, 255, 255, 0.7);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="splash">
    <div class="splash-logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
      </svg>
    </div>
    <div class="splash-title">Justin Chat</div>
    <div class="splash-subtitle">正在加载...</div>
    <div class="spinner"></div>
  </div>

  <script>
    function _updateBadge(count) {
      if ('setAppBadge' in navigator) {
        if (count > 0) navigator.setAppBadge(count);
        else navigator.clearAppBadge();
      }
    }
    function _openUrl(url) {
      try {
        var a = document.createElement('a');
        a.href = url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      } catch (e) {
        window.location.href = url;
      }
    }

    function _hideSplash() {
      var el = document.getElementById('splash');
      if (!el) return;
      el.classList.add('hidden');
      setTimeout(function() {
        if (el && el.parentNode) el.parentNode.removeChild(el);
      }, 600);
    }

    window.addEventListener('flutter-first-frame', _hideSplash);
    setTimeout(_hideSplash, 12000);
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
